<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Horoscope Astréa</title>
<meta name="description" content="Astréa — ton horoscope quotidien, compatibilité et guidance du ciel.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-variant-emoji:text}
:root{
  --void:#0B0714;
  --night:#14102A;
  --panel:#1B1436;
  --violet:#6B4FCF;
  --violet-glow:#9B7FE8;
  --gold:#E8C56B;
  --gold-bright:#F5D98A;
  --ivory:#EDE7F5;
  --muted:#9A8FB8;
  --line:rgba(155,127,232,.18);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Manrope',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--void);
  color:var(--ivory);
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
/* starfield */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1200px 700px at 50% -10%, rgba(107,79,207,.28), transparent 60%),
    radial-gradient(900px 600px at 85% 110%, rgba(232,197,107,.10), transparent 55%),
    var(--void);
}
.sky canvas{position:absolute;inset:0;width:100%;height:100%}
.app{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + clamp(10px,1.8vh,22px)) 20px
          calc(env(safe-area-inset-bottom) + clamp(14px,2.4vh,28px));
  max-width:560px;margin:0 auto}
/* le bouton reste dans le flux : plus aucun recouvrement de la grille */
#portal .cta{flex-shrink:0;margin-top:clamp(2px,1vh,10px)}

/* eyebrow / labels */
.eyebrow{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);
  font-weight:600;opacity:.85}
.muted{color:var(--muted)}

/* wordmark */
.brand{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.brand .mark{font-family:var(--serif);font-weight:500;font-size:15px;letter-spacing:.5em;
  color:var(--gold);text-transform:uppercase;padding-left:.5em}
.brand h1{font-family:var(--serif);font-weight:300;font-size:min(13vw,6.4vh,56px);
  line-height:.95;letter-spacing:.01em}
.brand h1 em{font-style:italic;color:var(--gold-bright)}

/* screens */
.screen{display:none;flex:1;flex-direction:column;animation:rise .6s cubic-bezier(.2,.7,.2,1)}
.screen.active{display:flex}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- PORTAL ---------- */
/* Tout est dimensionné en vh pour tenir sur un seul écran, sans scroll. */
/* Contenu centré : évite les grands vides sur écran haut (tablette, desktop). */
#portal{justify-content:center;gap:clamp(14px,2.6vh,30px);min-height:0}
.portal-top{display:flex;flex-direction:column;align-items:center;
  gap:clamp(4px,1.1vh,14px);padding-top:0;min-height:0}

.wheel-wrap{position:relative;width:min(56vw,25vh,250px);aspect-ratio:1;
  display:grid;place-items:center;margin:0;flex-shrink:0}
.wheel-wrap svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.ring-outer{transition:none}
.ring-inner{animation:spin 60s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.ring text{font-family:var(--serif);fill:var(--gold);font-size:15px}
.ring-inner text{fill:var(--violet-glow);font-size:12px}
.wheel-core{width:38%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(245,217,138,.35), rgba(107,79,207,.15) 55%, transparent 72%);
  border:1px solid var(--line);display:grid;place-items:center;
  box-shadow:0 0 60px rgba(107,79,207,.35), inset 0 0 30px rgba(245,217,138,.12)}
.wheel-core .glyph{font-family:var(--serif);font-size:clamp(28px,4.6vh,44px);color:var(--gold-bright);
  line-height:1}
.tagline{text-align:center;font-family:var(--serif);font-size:clamp(14px,1.85vh,18px);font-weight:300;
  font-style:italic;color:var(--muted);max-width:26ch;line-height:1.3;margin:0}

/* ---- roue tactile ---- */
.wheel-wrap{touch-action:none;cursor:grab;outline:none}
.wheel-wrap.dragging{cursor:grabbing}
.wheel-wrap:focus-visible{box-shadow:0 0 0 2px var(--gold);border-radius:50%}
.wheel-marker{position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;
  border-top:10px solid var(--gold-bright);z-index:3;
  filter:drop-shadow(0 0 6px rgba(245,217,138,.75))}
.ring text.on{fill:var(--gold-bright);font-size:19px}
.wheel-name{text-align:center;font-family:var(--serif);font-size:clamp(17px,2.4vh,23px);
  font-weight:500;color:var(--ivory);letter-spacing:.01em;min-height:1.2em;margin:0}
.wheel-name small{display:block;font-family:var(--sans);font-size:11px;letter-spacing:.26em;
  text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ---- bande ciel réel ---- */
.sky-strip{display:flex;align-items:center;gap:12px;background:var(--night);
  border:1px solid var(--line);border-radius:18px;padding:clamp(9px,1.6vh,14px) 16px;flex-shrink:0}
.sky-cell{display:flex;align-items:center;gap:10px;min-width:0}
.sky-planets{flex:1;min-width:0}
.sky-cell small{display:block;font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
.sky-cell b{font-family:var(--serif);font-weight:500;font-size:clamp(14px,1.9vh,17px);color:var(--ivory);
  display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sky-sep{width:1px;align-self:stretch;background:var(--line);flex:none}
.moon-dial{width:30px;height:30px;border-radius:50%;flex:none;position:relative;overflow:hidden;
  background:#0d0a1e;border:1px solid rgba(232,197,107,.35);
  box-shadow:0 0 14px rgba(245,217,138,.18)}
.moon-dial i{position:absolute;inset:0;background:linear-gradient(90deg,var(--gold-bright),#fff6dc);
  border-radius:50%}
.moon-dial u{position:absolute;top:-1px;bottom:-1px;width:120%;background:#0d0a1e;border-radius:50%}

/* ---- constellation animée ---- */
.constel{width:100%;height:120px;display:block;margin-bottom:2px}
.constel line{stroke:var(--gold);stroke-width:.5;opacity:.55;
  stroke-dasharray:var(--len);stroke-dashoffset:var(--len);
  animation:trace 1.1s ease forwards}
.constel circle{fill:#fff6dc;opacity:0;animation:twinkle-in .5s ease forwards}
@keyframes trace{to{stroke-dashoffset:0}}
@keyframes twinkle-in{to{opacity:1}}
@media (prefers-reduced-motion:reduce){
  .constel line{animation:none;stroke-dashoffset:0}
  .constel circle{animation:none;opacity:1}
}

/* buttons */
.cta{width:100%;border:1px solid transparent;border-radius:100px;padding:clamp(13px,2vh,17px);font-family:var(--sans);
  font-weight:600;font-size:15px;letter-spacing:.04em;cursor:pointer;transition:.22s;color:var(--void);
  background:linear-gradient(100deg,var(--gold),var(--gold-bright));
  box-shadow:0 10px 30px -8px rgba(232,197,107,.5)}
/* État d'attente : contour doré plutôt qu'un aplat terne. */
.cta:disabled{cursor:not-allowed;box-shadow:none;background:transparent;
  border:1px solid rgba(232,197,107,.42);color:rgba(232,197,107,.72);font-weight:500}
.cta:not(:disabled):hover{transform:translateY(-2px)}
.ghost{background:transparent;border:1px solid var(--line);color:var(--ivory);
  border-radius:100px;padding:14px;font-family:var(--sans);font-weight:600;font-size:14px;
  cursor:pointer;transition:.22s;width:100%}
.ghost:hover{border-color:var(--gold);color:var(--gold)}

/* ---------- GALAXY ---------- */
#galaxy{gap:22px;justify-content:flex-start}
#unlockBar{flex-shrink:0;margin-top:clamp(4px,1.4vh,14px)}
.gx-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.gx-you{display:flex;align-items:center;gap:12px}
.gx-you .orb{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--serif);font-size:24px;color:var(--gold-bright);
  background:radial-gradient(circle at 35% 30%, rgba(245,217,138,.3), rgba(107,79,207,.2));
  border:1px solid var(--line)}
.gx-you .meta small{display:block;font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.gx-you .meta b{font-family:var(--serif);font-weight:500;font-size:22px}
.link-back{background:none;border:none;color:var(--muted);cursor:pointer;font-family:inherit;
  font-size:13px;display:flex;align-items:center;gap:6px}
.link-back:hover{color:var(--gold)}

.modules{display:flex;flex-direction:column;gap:12px;flex:0 0 auto}
.mod{position:relative;text-align:left;background:var(--night);border:1px solid var(--line);
  border-radius:20px;padding:18px 18px;cursor:pointer;transition:.24s;overflow:hidden;
  display:flex;align-items:center;gap:16px;width:100%;font-family:inherit;color:var(--ivory)}
.mod:hover{border-color:rgba(232,197,107,.5);transform:translateY(-2px);background:var(--panel)}
.mod .ico{flex:none;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;
  font-family:var(--serif);font-size:24px;color:var(--gold);
  background:linear-gradient(150deg,rgba(107,79,207,.25),rgba(232,197,107,.08));border:1px solid var(--line)}
.mod .txt{flex:1}
.mod .txt h3{font-family:var(--serif);font-weight:500;font-size:21px;line-height:1.1}
.mod .txt p{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.35}
.mod .lock{flex:none;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  border:1px solid rgba(232,197,107,.4);border-radius:100px;padding:5px 10px;font-weight:600}
.mod .arrow{flex:none;color:var(--muted);font-size:20px}

/* ---------- MODAL ---------- */
.scrim{position:fixed;inset:0;z-index:40;background:rgba(6,4,12,.72);backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;padding:0}
.scrim.open{display:flex;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:linear-gradient(180deg,var(--panel),var(--night));border:1px solid var(--line);
  border-bottom:none;border-radius:28px 28px 0 0;width:100%;max-width:560px;max-height:90dvh;overflow-y:auto;
  padding:14px 24px calc(env(safe-area-inset-bottom) + 30px);animation:sheetUp .4s cubic-bezier(.2,.8,.2,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.grab{width:42px;height:4px;border-radius:100px;background:var(--line);margin:6px auto 20px}
.sheet .m-eyebrow{text-align:center;margin-bottom:6px}
.sheet h2{font-family:var(--serif);font-weight:400;font-size:32px;text-align:center;margin-bottom:4px}
.sheet .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}

.reading{background:var(--void);border:1px solid var(--line);border-radius:18px;padding:20px 20px;
  font-family:var(--serif);font-size:19px;font-weight:300;line-height:1.62;color:var(--ivory);
  white-space:pre-wrap}
.reading .drop::first-letter{font-size:40px;color:var(--gold-bright);float:left;line-height:.8;
  padding:6px 8px 0 0;font-weight:500}

.facets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.facet{background:var(--void);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center}
.facet small{display:block;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.facet b{font-family:var(--serif);font-size:20px;color:var(--gold)}
.stars{color:var(--gold);letter-spacing:2px;font-size:15px}
.stars .off{color:var(--line)}

.actions{display:flex;gap:10px;margin-top:20px}
.actions .cta,.actions .ghost{margin:0}

/* compatibility picker */
.compat-pick{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.compat-orb{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--serif);font-size:30px;color:var(--gold-bright);cursor:pointer;
  background:radial-gradient(circle at 35% 30%, rgba(245,217,138,.28), rgba(107,79,207,.2));
  border:1px solid var(--line);transition:.2s}
.compat-orb.pick{border-color:var(--muted);color:var(--muted);font-size:13px;letter-spacing:.15em}
.compat-heart{color:var(--gold);font-size:22px}
.mini-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:18px}
/* .zbtn ne sert plus qu'ici (la roue a remplacé la grille du portail) */
.zbtn{background:transparent;border:1px solid transparent;border-radius:12px;color:var(--ivory);
  display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  transition:.22s;font-family:inherit}
.zbtn .g{font-family:var(--serif);color:var(--gold);line-height:1}
.zbtn:hover{background:var(--panel)}
.zbtn.sel{background:linear-gradient(160deg,rgba(107,79,207,.35),rgba(232,197,107,.12));
  border-color:var(--gold);box-shadow:0 0 24px rgba(107,79,207,.3)}
.mini-grid .zbtn{padding:9px 2px}
.mini-grid .zbtn .g{font-size:19px}
.mini-grid .zbtn .n{display:none}
.score-ring{width:130px;height:130px;margin:0 auto 6px;position:relative;display:grid;place-items:center}
.score-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.score-ring b{font-family:var(--serif);font-size:40px;color:var(--gold-bright)}
.score-ring b span{font-size:18px;color:var(--muted)}

/* premium modal */
.premium-hero{text-align:center;padding:6px 0 4px}
.premium-hero .seal{width:70px;height:70px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--serif);font-size:34px;color:var(--void);
  background:linear-gradient(140deg,var(--gold),var(--gold-bright));
  box-shadow:0 0 40px rgba(232,197,107,.45)}
.perks{list-style:none;margin:20px 0;display:flex;flex-direction:column;gap:12px}
.perks li{display:flex;gap:12px;align-items:flex-start;font-size:14.5px;line-height:1.4}
.perks li .c{color:var(--gold);font-family:var(--serif);font-size:18px;flex:none;line-height:1.3}
.perks li b{font-weight:600}
.perks li span{color:var(--muted);display:block;font-size:12.5px}
.key-row{margin-top:16px}
.key-row label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);
  display:block;margin-bottom:8px;text-align:center}
.key-row input{width:100%;background:var(--void);border:1px solid var(--line);border-radius:14px;
  padding:15px;color:var(--ivory);font-family:'Manrope',monospace;font-size:14px;text-align:center;
  letter-spacing:.06em}
.key-row input:focus{outline:none;border-color:var(--gold)}
.note{text-align:center;font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5}
.note a{color:var(--gold)}
.status{text-align:center;font-size:13px;margin-top:12px;min-height:18px}
.status.err{color:#E88A8A}
.status.ok{color:var(--gold-bright)}

/* loader */
.loader{display:flex;flex-direction:column;align-items:center;gap:16px;padding:30px 0}
.loader .spin{width:34px;height:34px;border:2px solid var(--line);border-top-color:var(--gold);
  border-radius:50%;animation:spin .9s linear infinite}
.loader p{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:16px}

/* premium badge on galaxy */
.crown{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--void);background:linear-gradient(100deg,var(--gold),var(--gold-bright));
  padding:5px 11px;border-radius:100px;font-weight:700}

@media (prefers-reduced-motion:reduce){
  .ring-outer,.ring-inner,.spin{animation:none !important}
  .screen{animation:none}
}
</style>
</head>
<body>
<div class="sky"><canvas id="stars"></canvas></div>

<main class="app">

  <!-- ========== PORTAL ========== -->
  <section id="portal" class="screen active">
    <div class="portal-top">
      <div class="brand">
        <span class="mark">Horoscope</span>
        <h1>Astr<em>éa</em></h1>
      </div>

      <div class="wheel-wrap" id="wheelWrap" role="slider" tabindex="0"
           aria-label="Roue des signes. Fais tourner pour choisir ton signe."
           aria-valuemin="1" aria-valuemax="12" aria-valuenow="1" aria-valuetext="aucun signe">
        <div class="wheel-marker" aria-hidden="true"></div>
        <svg viewBox="0 0 100 100" class="ring-outer" aria-hidden="true">
          <g class="ring"><!-- outer glyphs injected --></g>
          <circle cx="50" cy="50" r="47" fill="none" stroke="var(--line)" stroke-width=".4"/>
        </svg>
        <svg viewBox="0 0 100 100" class="ring-inner" aria-hidden="true">
          <g class="ring"><!-- inner glyphs injected --></g>
          <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(232,197,107,.16)" stroke-width=".4"/>
        </svg>
        <div class="wheel-core"><span class="glyph" id="coreGlyph">✦</span></div>
      </div>

      <p class="wheel-name" id="wheelName">Fais tourner la roue</p>
    </div>

    <div class="sky-strip" id="skyStrip" aria-live="polite">
      <div class="sky-cell"><span class="moon-dial" id="moonDial"></span>
        <div><small id="moonName">—</small><b id="moonPct">—</b></div></div>
      <div class="sky-sep"></div>
      <div class="sky-cell sky-planets"><div><small>Visible ce soir</small><b id="planetList">—</b></div></div>
    </div>

    <button class="cta" id="enterBtn" disabled>Consulter le ciel</button>
  </section>

  <!-- ========== GALAXY ========== -->
  <section id="galaxy" class="screen">
    <div class="gx-head">
      <div class="gx-you">
        <div class="orb" id="youGlyph">✦</div>
        <div class="meta">
          <small id="youDates">—</small>
          <b id="youName">—</b>
        </div>
      </div>
      <button class="link-back" onclick="goPortal()">↩ changer</button>
    </div>

    <div class="modules" id="modules"></div>

    <button class="ghost" id="unlockBar" onclick="openPremium()">✦ Débloquer Astréa Complet</button>
  </section>
</main>

<!-- ========== MODAL ========== -->
<div class="scrim" id="scrim" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* ---------------- DATA ---------------- */
const SIGNS = [
  {k:'belier',   n:'Bélier',    g:'♈\uFE0E', el:'feu',   d:'21 mar – 19 avr', art:'du '},
  {k:'taureau',  n:'Taureau',   g:'♉\uFE0E', el:'terre', d:'20 avr – 20 mai', art:'du '},
  {k:'gemeaux',  n:'Gémeaux',   g:'♊\uFE0E', el:'air',   d:'21 mai – 20 juin', art:'des '},
  {k:'cancer',   n:'Cancer',    g:'♋\uFE0E', el:'eau',   d:'21 juin – 22 juil', art:'du '},
  {k:'lion',     n:'Lion',      g:'♌\uFE0E', el:'feu',   d:'23 juil – 22 aoû', art:'du '},
  {k:'vierge',   n:'Vierge',    g:'♍\uFE0E', el:'terre', d:'23 aoû – 22 sep', art:'de la '},
  {k:'balance',  n:'Balance',   g:'♎\uFE0E', el:'air',   d:'23 sep – 22 oct', art:'de la '},
  {k:'scorpion', n:'Scorpion',  g:'♏\uFE0E', el:'eau',   d:'23 oct – 21 nov', art:'du '},
  {k:'sagittaire',n:'Sagittaire',g:'♐\uFE0E',el:'feu',   d:'22 nov – 21 déc', art:'du '},
  {k:'capricorne',n:'Capricorne',g:'♑\uFE0E',el:'terre', d:'22 déc – 19 jan', art:'du '},
  {k:'verseau',  n:'Verseau',   g:'♒\uFE0E', el:'air',   d:'20 jan – 18 fév', art:'du '},
  {k:'poissons', n:'Poissons',  g:'♓\uFE0E', el:'eau',   d:'19 fév – 20 mar', art:'des '}
];
const EL_LABEL = {feu:'Feu',terre:'Terre',air:'Air',eau:'Eau'};

/* ---------------- STATE + STORAGE ---------------- */
const store = {
  get(k){ try{return localStorage.getItem(k)}catch(e){return null} },
  set(k,v){ try{localStorage.setItem(k,v)}catch(e){} }
};
let current = null;                       // selected sign object
let premium = store.get('astrea_premium') === '1';

/* ---------------- SEEDED GENERATOR (free daily) ---------------- */
function hash(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return((h^=h>>>16)>>>0)/4294967296}}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)]}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`}

function dailyReading(sign){
  const rng = hash(sign.k + todayKey());
  const text = [pick(rng,POOLS.open), pick(rng,POOLS.love), pick(rng,POOLS.work), pick(rng,POOLS.energy), pick(rng,POOLS.advice)].join(' ');
  const luck = 1 + Math.floor(rng()*98);
  const color = pick(rng,COLORS);
  const word = pick(rng,KEYWORDS);
  const stars = 3 + Math.floor(rng()*3); // 3–5
  return {text, luck, color, word, stars};
}

const EL_MATRIX = { // base affinity 0-100
  feu:{feu:82,terre:52,air:90,eau:48},
  terre:{feu:52,terre:80,air:55,eau:88},
  air:{feu:90,terre:55,air:78,eau:58},

const COMPAT_TXT = {
  high:"Une alchimie évidente. Vous vous comprenez sans traduire, et ce qui vous unit se renforce dans la durée.",
  mid:"Un attrait réel qui demande un peu d'attention. Vos différences sont un moteur si vous les accueillez.",
  low:"Le chemin est plus exigeant, mais les oppositions bien apprivoisées créent parfois les liens les plus profonds."
};
function compat(a,b){
  const rng = hash(a.k+'-'+b.k);
  let base = EL_MATRIX[a.el][b.el];
  base += Math.floor(rng()*11)-5;           // ±5 nuance
  base = Math.max(35,Math.min(98,base));
  const band = base>=78?'high':base>=58?'mid':'low';
  return {score:base, text:COMPAT_TXT[band]};
}

/* ---------------- ROUE TACTILE ---------------- */
let wheelRot = 0;          // degrés
let wheelIdx = -1;         // index du signe sous le marqueur
const STEP = 30;           // 360 / 12

function buildWheel(){
  const inner = document.querySelector('.ring-inner .ring');
  SIGNS.forEach((s,i)=>{
    const a2 = ((i+0.5)/12)*Math.PI*2 - Math.PI/2;
    const x2 = 50 + 32*Math.cos(a2), y2 = 50 + 32*Math.sin(a2);
    inner.innerHTML += `<text x="${x2.toFixed(2)}" y="${y2.toFixed(2)}" text-anchor="middle" dominant-baseline="middle">✦</text>`;
  });
  const outer = document.querySelector('.ring-outer .ring');
  outer.innerHTML = SIGNS.map(()=>`<text text-anchor="middle" dominant-baseline="middle"></text>`).join('');
  renderWheel();
}

/* Place les 12 glyphes selon la rotation courante. Les glyphes restent droits. */
function renderWheel(){
  const nodes = document.querySelectorAll('.ring-outer .ring text');
  // index sous le marqueur (en haut) : on cherche le glyphe dont l'angle vaut -90°
  const idx = ((Math.round(-wheelRot/STEP)) % 12 + 12) % 12;
  SIGNS.forEach((s,i)=>{
    const deg = (i*STEP + wheelRot) - 90;
    const rad = deg*Math.PI/180;
    const n = nodes[i];
    if(!n) return;
    n.setAttribute('x', (50 + 43*Math.cos(rad)).toFixed(2));
    n.setAttribute('y', (50 + 43*Math.sin(rad)).toFixed(2));
    n.textContent = s.g;
    n.classList.toggle('on', i===idx);
  });
  if(idx !== wheelIdx){
    wheelIdx = idx;
    tick();
    previewSign(SIGNS[idx]);
  }
}

function tick(){
  try{ if(navigator.vibrate) navigator.vibrate(8); }catch(e){}
}

/* Aperçu pendant la rotation (pas encore validé) */
function previewSign(s){
  document.getElementById('coreGlyph').textContent = s.g;
  document.getElementById('wheelName').innerHTML = `${s.n}<small>${s.d}</small>`;
  const w = document.getElementById('wheelWrap');
  w.setAttribute('aria-valuenow', String(SIGNS.indexOf(s)+1));
  w.setAttribute('aria-valuetext', s.n);
}

/* Validation : met à jour l'état + le bouton */
function selectSign(k){
  current = SIGNS.find(s=>s.k===k);
  if(!current) return;
  const i = SIGNS.indexOf(current);
  wheelRot = -i*STEP;
  renderWheel();
  previewSign(current);
  const btn = document.getElementById('enterBtn');
  btn.disabled = false; btn.textContent = `Consulter le ciel ${current.art}${current.n}`;
}

function commitWheel(){
  const s = SIGNS[wheelIdx];
  if(!s) return;
  current = s;
  const btn = document.getElementById('enterBtn');
  btn.disabled = false; btn.textContent = `Consulter le ciel ${s.art}${s.n}`;
}

function initWheelDrag(){
  const el = document.getElementById('wheelWrap');
  let dragging=false, startAngle=0, startRot=0;

  const angleOf = (e)=>{
    const r = el.getBoundingClientRect();
    return Math.atan2(e.clientY - (r.top + r.height/2),
                      e.clientX - (r.left + r.width/2)) * 180/Math.PI;
  };

  el.addEventListener('pointerdown', e=>{
    dragging=true; el.classList.add('dragging');
    el.setPointerCapture(e.pointerId);
    startAngle = angleOf(e); startRot = wheelRot;
  });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    e.preventDefault();
    wheelRot = startRot + (angleOf(e) - startAngle);
    renderWheel();
  });
  const end = ()=>{
    if(!dragging) return;
    dragging=false; el.classList.remove('dragging');
    wheelRot = Math.round(wheelRot/STEP)*STEP;   // accroche au cran
    renderWheel();
    commitWheel();
  };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);

  // clavier
  el.addEventListener('keydown', e=>{
    if(e.key==='ArrowLeft' || e.key==='ArrowDown'){ wheelRot += STEP; }
    else if(e.key==='ArrowRight' || e.key==='ArrowUp'){ wheelRot -= STEP; }
    else if(e.key==='Enter' || e.key===' '){ commitWheel(); e.preventDefault(); return; }
    else return;
    e.preventDefault(); renderWheel(); commitWheel();
  });
}

/* ---------------- SHARE CARD (canvas) ---------------- */
async function shareCard(title, body){
  const c = document.createElement('canvas'); c.width=1080; c.height=1350;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,1080,1350);
  g.addColorStop(0,'#14102A');g.addColorStop(1,'#0B0714');
  x.fillStyle=g;x.fillRect(0,0,1080,1350);
  // stars
  x.fillStyle='rgba(245,217,138,.5)';
  for(let i=0;i<80;i++){x.globalAlpha=Math.random()*.7+.1;x.beginPath();x.arc(Math.random()*1080,Math.random()*1350,Math.random()*2.2,0,7);x.fill()}
  x.globalAlpha=1;
  // glow
  const rg=x.createRadialGradient(540,430,20,540,430,320);
  rg.addColorStop(0,'rgba(107,79,207,.45)');rg.addColorStop(1,'rgba(107,79,207,0)');
  x.fillStyle=rg;x.beginPath();x.arc(540,430,320,0,7);x.fill();
  // glyph
  x.fillStyle='#F5D98A';x.textAlign='center';x.font='300 200px "Cormorant Garamond",serif';
  x.fillText(current.g,540,500);
  // wordmark
  x.fillStyle='#E8C56B';x.font='600 30px Manrope,sans-serif';
  x.fillText('H O R O S C O P E   A S T R É A',540,140);
  // title
  x.fillStyle='#EDE7F5';x.font='500 46px "Cormorant Garamond",serif';
  x.fillText(title,540,640);
  // body wrapped
  x.font='300 40px "Cormorant Garamond",serif';x.fillStyle='#EDE7F5';
  const words=body.split(' ');let line='',y=760;
  for(const w of words){const t=line+w+' ';if(x.measureText(t).width>860){x.fillText(line,540,y);line=w+' ';y+=58;if(y>1230)break}else line=t}
  x.fillText(line,540,y);
  x.fillStyle='#9A8FB8';x.font='400 26px Manrope';x.fillText('✦ horoscope-astrea ✦',540,1290);

  const blob = await new Promise(r=>c.toBlob(r,'image/png'));
  const file = new File([blob],'astrea.png',{type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'Horoscope Astréa'}); return; }catch(e){}
  }
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='astrea.png';a.click();
}

function constellationSVG(key){
  const c = CONSTEL[key];
  if(!c) return '';
  const lines = c.s.map(([i,j],n)=>{
    const [x1,y1]=c.p[i], [x2,y2]=c.p[j];
    const len = Math.hypot(x2-x1, y2-y1).toFixed(1);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" style="--len:${len};animation-delay:${(n*0.09).toFixed(2)}s"/>`;
  }).join('');
  const dots = c.p.map(([x,y],n)=>
    `<circle cx="${x}" cy="${y}" r="${n===0?1.5:1.1}" style="animation-delay:${(0.25+n*0.07).toFixed(2)}s"/>`).join('');
  return `<svg class="constel" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">${lines}${dots}</svg>`;
}

/* ---------------- CIEL RÉEL ----------------
   Phase lunaire + planètes visibles, calculées en local.
   Aucune API, aucune clé : ça marche hors ligne et ne coûte rien.
   Éléments képlériens approchés (JPL, valables 1800–2050).            */
const OBS = { lat: 48.8566, lon: 2.3522 };   // Paris
const DEG = Math.PI/180;

function julianDay(d){ return d.getTime()/86400000 + 2440587.5; }

/* ---- Lune : phase moyenne (précision ~½ jour, suffisant pour l'affichage) ---- */
const SYNODIC = 29.530588853;
const NEW_MOON_REF = 2451550.09766;          // nouvelle lune du 6 janvier 2000
function moonInfo(d){
  const age = (((julianDay(d) - NEW_MOON_REF) % SYNODIC) + SYNODIC) % SYNODIC;
  const phase = age / SYNODIC;                       // 0 → 1
  const illum = (1 - Math.cos(2*Math.PI*phase)) / 2; // 0 → 1
  const names = ['Nouvelle lune','Premier croissant','Premier quartier','Lune gibbeuse',
                 'Pleine lune','Gibbeuse décroissante','Dernier quartier','Dernier croissant'];
  const name = names[Math.floor(((phase*8)+0.5)) % 8];
  return { phase, illum, name, waxing: phase < 0.5 };
}

/* ---- Planètes ---- */
const PLANETS = [
  {n:'Mercure', a:[0.38709927,0.00000037], e:[0.20563593,0.00001906], i:[7.00497902,-0.00594749],
   L:[252.25032350,149472.67411175], w:[77.45779628,0.16047689],  o:[48.33076593,-0.12534081]},
  {n:'Vénus',   a:[0.72333566,0.00000390], e:[0.00677672,-0.00004107], i:[3.39467605,-0.00078890],
   L:[181.97909950,58517.81538729], w:[131.60246718,0.00268329], o:[76.67984255,-0.27769418]},
  {n:'Mars',    a:[1.52371034,0.00001847], e:[0.09339410,0.00007882], i:[1.84969142,-0.00813131],
   L:[-4.55343205,19140.30268499], w:[-23.94362959,0.44441088],  o:[49.55953891,-0.29257343]},
  {n:'Jupiter', a:[5.20288700,-0.00011607], e:[0.04838624,-0.00013253], i:[1.30439695,-0.00183714],
   L:[34.39644051,3034.74612775], w:[14.72847983,0.21252668],    o:[100.47390909,0.20469106]},
  {n:'Saturne', a:[9.53667594,-0.00125060], e:[0.05386179,-0.00050991], i:[2.48599187,0.00193609],
   L:[49.95424423,1222.49362201], w:[92.59887831,-0.41897216],   o:[113.66242448,-0.28867794]}
];
const EARTH = {a:[1.00000261,0.00000562], e:[0.01671123,-0.00004392], i:[-0.00001531,-0.01294668],
               L:[100.46457166,35999.37244981], w:[102.93768193,0.32327364], o:[0,0]};

function heliocentric(p, T){
  const a = p.a[0]+p.a[1]*T, e = p.e[0]+p.e[1]*T, I = (p.i[0]+p.i[1]*T)*DEG;
  const L = p.L[0]+p.L[1]*T, wb = p.w[0]+p.w[1]*T, om = (p.o[0]+p.o[1]*T)*DEG;
  let M = (L - wb) % 360; if(M>180) M-=360; if(M<-180) M+=360;
  M *= DEG;
  let E = M;                                   // Kepler par itération
  for(let k=0;k<6;k++) E = E - (E - e*Math.sin(E) - M)/(1 - e*Math.cos(E));
  const xo = a*(Math.cos(E)-e), yo = a*Math.sqrt(1-e*e)*Math.sin(E);
  const w = wb*DEG - om;
  const cw=Math.cos(w), sw=Math.sin(w), co=Math.cos(om), so=Math.sin(om), ci=Math.cos(I), si=Math.sin(I);
  return {
    x: (cw*co - sw*so*ci)*xo + (-sw*co - cw*so*ci)*yo,
    y: (cw*so + sw*co*ci)*xo + (-sw*so + cw*co*ci)*yo,
    z: (sw*si)*xo + (cw*si)*yo
  };
}

/* Hauteur au-dessus de l'horizon, en degrés */
function altitudeOf(geo, jd){
  const eps = 23.43928*DEG;
  const xe = geo.x;
  const ye = geo.y*Math.cos(eps) - geo.z*Math.sin(eps);
  const ze = geo.y*Math.sin(eps) + geo.z*Math.cos(eps);
  const r  = Math.sqrt(xe*xe+ye*ye+ze*ze);
  const ra = Math.atan2(ye, xe);
  const dec= Math.asin(ze/r);
  let gmst = (280.46061837 + 360.98564736629*(jd - 2451545.0)) % 360;
  const ha = (gmst + OBS.lon)*DEG - ra;
  const lat = OBS.lat*DEG;
  return Math.asin(Math.sin(dec)*Math.sin(lat) + Math.cos(dec)*Math.cos(lat)*Math.cos(ha))/DEG;
}

function planetAlts(d){
  const jd = julianDay(d), T = (jd - 2451545.0)/36525;
  const earth = heliocentric(EARTH, T);
  return PLANETS.map(p=>{
    const h = heliocentric(p, T);
    return { name:p.n, alt: altitudeOf({x:h.x-earth.x, y:h.y-earth.y, z:h.z-earth.z}, jd) };
  });
}

function skyNow(d){
  const jd = julianDay(d), T = (jd - 2451545.0)/36525;
  const earth = heliocentric(EARTH, T);
  const sunAlt = altitudeOf({x:-earth.x, y:-earth.y, z:-earth.z}, jd);
  const visible = planetAlts(d).filter(p=>p.alt>5).sort((a,b)=>b.alt-a.alt);
  return { sunAlt, visible, night: sunAlt < -6 };
}

/* Prochain lever d'une planète dans les 14 h à venir */
function nextRise(from){
  for(let m=10; m<=14*60; m+=10){
    const d = new Date(from.getTime() + m*60000);
    const p = planetAlts(d).find(q=>q.alt>5);
    if(p) return { name:p.name, at:d };
  }
  return null;
}

/* Ce qui sera levé ce soir (prochain 23 h locale) */
function tonight(from){
  const d = new Date(from);
  if(d.getHours() >= 23) d.setDate(d.getDate()+1);
  d.setHours(23,0,0,0);
  return { list: planetAlts(d).filter(p=>p.alt>5).sort((a,b)=>b.alt-a.alt), at:d };
}

function renderSkyStrip(){
  const now = new Date();
  const m = moonInfo(now);
  document.getElementById('moonName').textContent = m.name;
  document.getElementById('moonPct').textContent = Math.round(m.illum*100)+'% éclairée';

  // cadran lunaire : disque doré, masqué par un disque sombre qui se retire
  // à mesure que la lune s'éclaire (par la gauche si croissante, sinon à droite).
  const dial = document.getElementById('moonDial');
  const shift = -10 + (m.waxing ? -1 : 1) * m.illum * 110;
  dial.innerHTML = `<i></i><u style="left:${shift.toFixed(1)}%"></u>`;

  const s = skyNow(now);
  const label = document.querySelector('.sky-planets small');
  const el = document.getElementById('planetList');
  const hhmm = t => t.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

  if(s.night && s.visible.length){
    label.textContent = 'Visible maintenant';
    el.textContent = s.visible.map(p=>p.name).join(' · ');
    return;
  }
  const t = tonight(now);
  if(t.list.length){
    label.textContent = 'Visible ce soir';
    el.textContent = t.list.map(p=>p.name).join(' · ');
    return;
  }
  const r = nextRise(now);
  if(r){
    label.textContent = 'Prochain lever';
    el.textContent = `${r.name} vers ${hhmm(r.at)}`;
  }else{
    label.textContent = 'Ce soir';
    el.textContent = 'Ciel sans planète';
  }
}
/* ---------------- CIEL EN PROFONDEUR (parallaxe) ----------------
   Trois couches d'étoiles à des distances différentes. L'inclinaison du
   téléphone (ou la souris) les décale à des vitesses distinctes. */
(function stars(){
  const cv = document.getElementById('stars');
  const x  = cv.getContext('2d');
  let w, h, pts, dpr = Math.min(devicePixelRatio||1, 2);
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  let tx=0, ty=0, cx=0, cy=0;   // décalage visé / courant

  function size(){
    w = cv.width  = innerWidth  * dpr;
    h = cv.height = innerHeight * dpr;
    cv.style.width = innerWidth+'px'; cv.style.height = innerHeight+'px';
    const n = Math.min(190, Math.floor(innerWidth*innerHeight/9000));
    pts = Array.from({length:n}, ()=>{
      const layer = Math.random();
      const z = layer<.5 ? .35 : layer<.82 ? .65 : 1;   // profondeur
      return { x:Math.random()*w, y:Math.random()*h,
               r:(z*1.5+.25)*dpr, a:Math.random(),
               s:Math.random()*.02+.004, z };
    });
  }
  size();
  addEventListener('resize', size);

  // inclinaison de l'appareil
  addEventListener('deviceorientation', e=>{
    if(e.gamma==null || e.beta==null) return;
    tx = Math.max(-1, Math.min(1, e.gamma/35));
    ty = Math.max(-1, Math.min(1, (e.beta-45)/35));
  }, true);
  // repli souris / desktop
  addEventListener('pointermove', e=>{
    tx = (e.clientX/innerWidth  - .5)*2;
    ty = (e.clientY/innerHeight - .5)*2;
  }, {passive:true});

  function draw(){
    x.clearRect(0,0,w,h);
    cx += (tx-cx)*.06; cy += (ty-cy)*.06;      // lissage
    const amp = 26*dpr;
    for(const p of pts){
      if(!reduce) p.a += p.s;
      const o  = reduce ? .55 : (Math.sin(p.a)+1)/2;
      const px = p.x - cx*amp*p.z;
      const py = p.y - cy*amp*p.z;
      x.globalAlpha = o*.7 + .1;
      x.fillStyle   = o>.6 ? '#F5D98A' : '#9B7FE8';
      x.beginPath(); x.arc(px, py, p.r, 0, 7); x.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
